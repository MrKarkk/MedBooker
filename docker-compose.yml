services:
  # PostgreSQL база данных
  postgres:
    image: postgres:16-alpine
    container_name: medbooker_postgres
    restart: unless-stopped
    command: 
      - "postgres"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "effective_cache_size=384MB"
      - "-c"
      - "work_mem=2MB"
      - "-c"
      - "maintenance_work_mem=32MB"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "wal_buffers=4MB"
      - "-c"
      - "min_wal_size=128MB"
      - "-c"
      - "max_wal_size=512MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "checkpoint_timeout=15min"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "max_worker_processes=2"
      - "-c"
      - "max_parallel_workers_per_gather=1"
      - "-c"
      - "max_parallel_workers=2"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "log_statement=none"
      - "-c"
      - "log_duration=off"
      - "-c"
      - "log_line_prefix=%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h "
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - medbooker_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Django Backend с Gunicorn
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medbooker_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./backend/logs:/app/logs
    # ports:
    #   - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - medbooker_network
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 10s
      retries: 1
      start_period: 0s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Telegram-бот (polling) — единственный экземпляр
  telegram-bot:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medbooker_telegram_bot
    restart: unless-stopped
    command: python manage.py run_bot
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/logs:/app/logs
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          memory: 128M
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - medbooker_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # React Frontend с Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medbooker_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          memory: 64M
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - medbooker_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis — брокер и бэкенд для Celery
  redis:
    image: redis:7-alpine
    container_name: medbooker_redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no --maxmemory 64mb --maxmemory-policy allkeys-lru
    networks:
      - medbooker_network
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 96M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Celery Worker — выполняет задачи из очереди backup
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medbooker_celery_worker
    restart: unless-stopped
    command: >
      celery -A backend worker
      --queues=backup
      --concurrency=1
      --loglevel=info
      --max-tasks-per-child=10
    env_file:
      - ./backend/.env
    volumes:
      - ./backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - medbooker_network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 192M
        reservations:
          memory: 96M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Celery Beat — планировщик (запускает задачи по расписанию)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medbooker_celery_beat
    restart: unless-stopped
    command: >
      celery -A backend beat
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
      --loglevel=info
    env_file:
      - ./backend/.env
    volumes:
      - ./backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - medbooker_network
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

networks:
  medbooker_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16